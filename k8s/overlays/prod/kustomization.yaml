apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress.yaml

secretGenerator:
  - name: hebban-secret
    envs:
      - secrets/hebban.env
    options:
      disableNameSuffixHash: true

images:
  - name: ghcr.io/mortenzwarenstein/kobo-hebban-adapter
    newTag: latest
